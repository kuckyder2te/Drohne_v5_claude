; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; Bare "pio run" / "pio run --target upload" baut NUR die Firmware.
; Die Test-Tools werden gezielt per -e angesprochen (siehe unten).
default_envs = rpipico

; ── Gemeinsame Basis fuer Firmware + alle Test-Tools ───────────
[env]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board_build.core = earlephilhower
board = rpipico
framework = arduino
upload_protocol = picotool
monitor_port = COM11
monitor_speed = 115200

lib_deps =
	nrf24/RF24@^1.4.8
	robtillaart/MS5611@^0.4.0
	wollewald/ICM20948_WE@^1.1.5
	philj404/SimpleSerialShell @ ^1.0.0

build_flags =
    -DGLOBAL_DEBUG
    -Iinclude
;   -DLOG_TIMESTAMP
;   -D_DEBUG_=VERBOSE
;   -D_DEBUG_=NOTICE
;   -D_DEBUG_=WARNING
;   -D_DEBUG_=FATAL

; ── Firmware (Normalbetrieb) ───────────────────────────────────
; Baut src/ (main.cpp -> NormalMode), schliesst aber die Test-Tools aus.
[env:rpipico]
build_src_filter = +<*> -<tools/>

; ── Eigenstaendige Hardware-Test-Tools unter src/tools/ ────────
; Jedes Tool hat sein eigenes setup()/loop() unter src/tools/<name>/ und
; wird als eigene Umgebung gebaut: build_src_filter ersetzt den restlichen
; src/-Baum durch genau einen Tool-Ordner; lib/ wird ohnehin automatisch
; mitgelinkt, sodass jedes Tool nur die Treiber-Module bekommt, die es
; per #include nutzt. main.cpp/NormalMode/... werden dabei NICHT kompiliert.
;
; Bauen/Flashen z.B.:
;   pio run -e test_imu --target upload
;   pio device monitor
[env:test_motors]
build_src_filter = -<*> +<tools/test_motors/>

[env:test_motors_single]
build_src_filter = -<*> +<tools/test_motors_single/>

[env:test_barometer]
build_src_filter = -<*> +<tools/test_barometer/>

[env:test_imu]
build_src_filter = -<*> +<tools/test_imu/>

[env:test_ultrasonic]
build_src_filter = -<*> +<tools/test_ultrasonic/>

[env:test_i2c_scan]
build_src_filter = -<*> +<tools/test_i2c_scan/>
