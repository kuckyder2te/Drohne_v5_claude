; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:rpipico]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board_build.core = earlephilhower
board = rpipico
framework = arduino
upload_protocol = picotool
monitor_port = COM11
monitor_speed = 115200

lib_deps =
	nrf24/RF24@^1.4.8
	robtillaart/MS5611@^0.4.0
	wollewald/ICM20948_WE@^1.1.5
	philj404/SimpleSerialShell @ ^1.0.0
	

build_flags =
    -DGLOBAL_DEBUG
    -Iinclude
;   -DLOG_TIMESTAMP
;   -D_DEBUG_=VERBOSE
;   -D_DEBUG_=NOTICE
;   -D_DEBUG_=WARNING
;   -D_DEBUG_=FATAL

; ── Eigenstaendige Test-Tools (siehe test/README) ──────────────
; Jedes Tool hat sein eigenes setup()/loop() unter test/<name>/ und wird
; ueber PlatformIOs Unit-Testing-Mechanismus ("pio test") isoliert gebaut:
; test_build_src ist per Default "false", d.h. src/ (main.cpp etc.) wird
; dabei NICHT mitkompiliert - lib/ wird trotzdem automatisch mitgelinkt,
; nur mit den Treiber-Modulen, die das jeweilige Tool per #include nutzt.
;
; Aufruf z.B.:
;   pio test -e rpipico -f test_motors --without-testing
;   pio device monitor
;
; "--without-testing" ueberspringt PlatformIOs Unity-Ergebnis-Auswertung,
; da diese Tools interaktive Bench-Werkzeuge sind, keine Assert-Tests.
